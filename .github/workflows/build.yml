name: Build

on:
  push:
    branches: [ main, master ]
    tags: [ 'v*' ]
  pull_request:
  workflow_dispatch:

env:
  APP_NAME: 'PurePaste'
  VERSION: '1.0.0'
  MACOS_DEPLOYMENT_TARGET: '13.0'
  DOTNET_VERSION: '8.0.x'

jobs:
  macos:
    runs-on: macos-13
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build macOS app and DMG
        run: |
          bash macos/package_macos.sh
        env:
          APP_NAME: ${{ env.APP_NAME }}
          VERSION: ${{ env.VERSION }}
          MIN_MACOS: ${{ env.MACOS_DEPLOYMENT_TARGET }}

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: purepaste-macos
          path: dist/PurePaste.dmg

  windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Publish Windows executable
        run: |
          dotnet publish windows/PurePaste.Windows/PurePaste.Windows.csproj -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true -o artifacts/windows/publish

      - name: Create Windows package
        shell: pwsh
        run: |
          Compress-Archive -Path artifacts/windows/publish/* -DestinationPath artifacts/windows/PurePaste-windows-x64.zip

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: purepaste-windows
          path: artifacts/windows/PurePaste-windows-x64.zip

  release:
    runs-on: ubuntu-latest
    needs: [macos, windows]
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: purepaste-macos
          path: release/macos

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: purepaste-windows
          path: release/windows

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/macos/PurePaste.dmg
            release/windows/PurePaste-windows-x64.zip
